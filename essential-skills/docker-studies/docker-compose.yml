version: '3'

services:
  web:
    build: .

    image: node:16
    depends_on:
      - db

    ports:
      - "3000:3000"

    environment:
      DATABASE_URL: postgres://postgres:1797@db:5433/mydatabase
      NODE_ENV: development

    networks:
      - api-sequelize

  db:
    image: postgres
    environment:
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1797

    ports:
      - "5433:5432"
    networks:
      - api-sequelize

networks:
  api-sequelize:
    driver: bridge
